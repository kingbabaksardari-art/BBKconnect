name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:  # دکمه‌ی manual trigger توی تب Actions

jobs:
  build:
    name: Build debug + release APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # نصب Gradle 8.7 روی runner. بعد از این می‌توان `gradle` را
      # مستقیم اجرا کرد و نیازی به gradle-wrapper.jar نیست.
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Build release APK (unsigned)
        run: gradle :app:assembleRelease --stacktrace --no-daemon

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk           artifacts/BBK-CONNECT-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/BBK-CONNECT-release-unsigned.apk

      - name: Upload APKs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BBK-CONNECT-APKs
          path: artifacts/*.apk
          retention-days: 14
